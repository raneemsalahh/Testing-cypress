name: Cypress E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  cypress-bdd:
    name: BDD Suite (Cucumber / Gherkin)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run BDD Cucumber Tests
        continue-on-error: true
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          headed: false
          config: baseUrl=https://practicesoftwaretesting.com,defaultCommandTimeout=15000,pageLoadTimeout=60000
          spec: cypress/e2e/features/**/*.feature

      - name: Upload BDD screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bdd-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

  cypress-pom:
    name: POM Suite (Page Object Model)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Temporarily enable .cy.js specs
        run: |
          npx cypress run \
            --spec "cypress/e2e/toolshop.cy.js" \
            --browser chrome \
            --headless \
            --config baseUrl=https://practicesoftwaretesting.com,defaultCommandTimeout=15000,pageLoadTimeout=60000 \
            || true

      - name: Upload POM screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pom-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore